version: '3.8'

services:
  cmdb-db:
    image: postgres:15-alpine
    container_name: cmdb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cmdb_admin
      POSTGRES_PASSWORD: cmdb_super_secret_password
      POSTGRES_DB: core_cmdb
    ports:
      - "5432:5432"
    volumes:
      - cmdb-data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/init_schema.sql
    networks:
      - cmdb_network

  cmdb-ui:
    image: appsmith/appsmith-ce:latest
    container_name: cmdb-appsmith-ui
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - cmdb-appsmith-data:/appsmith-stacks
    networks:
      - cmdb_network
    depends_on:
      - cmdb-db

networks:
  cmdb_network:
    driver: bridge

volumes:
  cmdb-data:
  cmdb-appsmith-data:
